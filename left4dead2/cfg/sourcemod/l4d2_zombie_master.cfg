// Enable funny Louis and Ellis voice lines. sv_allowdownload must be 1. If sv_downloadurl is empty the project github will be linked automatically.
// -
// Default: "1.0"
// Minimum: "0.000000"
// Maximum: "1.000000"
zm_memes "1.0"

// Threshold ping in seconds to periodically re-open ZM sourcemod menu. Prevents menu from closing unexpectedly for high pings. Lower values are more aggressive about reopening. 0.0 will always periodically reopen the menu. -1.0 to disable.
// -
// Default: "0.05"
// Minimum: "-1.000000"
// Maximum: "1000.000000"
zm_menu_reopen_ping "0.05"

