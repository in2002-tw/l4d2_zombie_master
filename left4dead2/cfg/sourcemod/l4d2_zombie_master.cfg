// These are the PLUGIN START-UP settings for l4d2_zombie_master.smx
// These cvars will run once on plugin startup, or when zm_enable is set to 1.
// All commented out cvars are managed inside the /l4d2_zombie_master folder with gamemode-specific .cfgs.
// If you want to adjust the gameplay balance, edit the .cfgs there (zm_default.cfg)

// Set cooldown for all Special abilities. -1.0 to use game defaults.
// -
// Default: "-1.0"
// Minimum: "-1.000000"
// Maximum: "10000.000000"
//zm_ability_cooldown "-1.0"

// Allow ZM to freeze Special Infected.
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
//zm_allow_freeze "1"

// Initial ZM bank.
