// Enable dumb stuff.
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
zm_cursed "0"

// Print plugin debug info to server.
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
zm_debug "0"

// Dynamic first tank pricing on maps where tanks are allowed: 50% off when survivors reach 66.6% progress.
// -
// Default: "1.0"
// Minimum: "0.000000"
// Maximum: "1.000000"
//zm_discount_tank "1.0"

// 0=Plugin off, 1=Plugin on.
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
// zm_enable "0"

// Queue system to allow all players a fair chance at playing ZM.
// -
// Default: "1.0"
// Minimum: "0.000000"
// Maximum: "1.000000"
zm_fair_queue "1.0"

// How long to wait for client response to ZM offer.
// -
// Default: "10.0"
// Minimum: "0.000000"
// Maximum: "30.000000"
zm_fair_queue_wait "10.0"

// Force all ZM commons to spawn as this type. Values: riot ceda clown mud road jimmy.
// -
// Default: ""
//zm_force_common ""

// Specify gamemode cfg inside cfg/sourcemod/l4d2_zombie_master/, or random to randomize.
// -
// Default: "zm_default"
zm_gamemode "zm_default"

// Integrate GridLib into ZM spawner.
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
zm_grid "1"

// Invalid cell cooldown time. This is an optimization. Do not change unless you know what you are doing.
// -
// Default: "0.0"
// Minimum: "0.000000"
// Maximum: "10000.000000"
//zm_grid_cooldown "0.0"

// Hold Finale stages until ZM runs out of resources. Otherwise the Finale will be very short.
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
//zm_hold_finale "1"

// Seconds of inactivity before the ZM is kicked to survivors. 0 to disable.
// -
// Default: "120.0"
// Minimum: "0.000000"
// Maximum: "100000.000000"
zm_inactivity "120.0"

// Allow players to leave safezone only if: there is a ZM, zm prep time is over, and players have stopped joining.
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
// zm_lock_saferoom "1"

// Max number of total alive special infected: -n for AliveSurvivors-n+1, otherwise whatever number is given.
