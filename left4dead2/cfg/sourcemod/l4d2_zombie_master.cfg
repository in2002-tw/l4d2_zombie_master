// Default non-gamemode related settings. These are run only ONCE on plugin start, and never again.
// This is why most of the settings are commented out.
// To set gamemode related settings, go to /l4d2_zombie_master.
// To set settings that should be enforced on every map start, set them in server.cfg.

zm_gamemode "zm_default"

// Initial ZM bank.
