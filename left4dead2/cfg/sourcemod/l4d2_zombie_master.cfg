//zm_max_SI "-1.0"

// Maximum simultaneously-armed alarm cars.
// -
// Default: "2"
// Minimum: "0.000000"
// Maximum: "16.000000"
//zm_max_trap_car "2"

// Maximum simultaneously-armed panic doors.
// -
// Default: "3"
// Minimum: "0.000000"
// Maximum: "16.000000"
//zm_max_trap_door "3"

// Maximum simultaneously-active tornadoes.
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "16.000000"
//zm_max_trap_tornado "1"

// Max number of each special infected class: -1 for automatic AliveSurvivors//2, otherwise whatever number is given.
// -
// Default: "-1.0"
// Minimum: "-1.000000"
// Maximum: "32.000000"
//zm_max_unique_SI "-1.0"

// Max number of witches: -1 for automatic AliveSurvivors//2, otherwise whatever number is given.
// -
// Default: "-1.0"
// Minimum: "-1.000000"
// Maximum: "1000.000000"
//zm_max_witches "-1.0"

// ZM max number of common zombies. Be careful.
// -
// Default: "75"
// Minimum: "0.000000"
// Maximum: "500.000000"
//zm_maxcommons "75"

// Enable Survivor voice lines. sv_allowdownload must be 1. If sv_downloadurl is empty the project github will be linked automatically.
// -
// Default: "1.0"
// Minimum: "0.000000"
// Maximum: "1.000000"
zm_memes "1.0"

// Threshold ping in seconds to periodically re-open ZM sourcemod menu. Prevents menu from closing unexpectedly for high pings. Lower values are more aggressive about reopening. 0.0 will always periodically reopen the menu. -1.0 to disable.
// -
// Default: "0.05"
// Minimum: "-1.000000"
// Maximum: "1000.000000"
zm_menu_reopen_ping "0.05"

// Minimum gap between ZM rewards during Finale. Forces ZM to conserve resources.
// -
// Default: "45.0"
// Minimum: "0.000000"
// Maximum: "10000.000000"
// zm_min_finale_stage "45.0"

// Fully disable tanks, including Survival, Finales and scripted tanks.
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
// zm_notanks "0"

// Warn players when there is no ZM.
// -
// Default: "1.0"
// Minimum: "0.000000"
// Maximum: "1.000000"
zm_nozm_warning "1.0"

